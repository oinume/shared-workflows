name: shared-claude

on:
  workflow_call:
    inputs:
      claude_args:
        description: "Additional arguments to pass to Claude Code (e.g. --mcp-config, --allowedTools)"
        required: true
        type: string
      allowed_bots:
        description: "Comma-separated list of bot names allowed to trigger the workflow"
        required: false
        type: string
        default: "claude-bot,claude"
      fetch_depth:
        description: "Number of commits to fetch (0 for full history)"
        required: false
        type: number
        default: 1
      settings:
        description: "Path to a settings JSON file or inline JSON string for Claude Code settings"
        required: false
        type: string
        default: ""
    secrets:
      anthropic_api_key:
        description: "Anthropic API key"
        required: true

jobs:
  shared-claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: ${{ inputs.fetch_depth }}

      # Extract model from comment/issue body
      - name: Determine Claude Model
        id: determine-claude-model
        run: |
          # Get the comment/issue body based on event type
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            BODY=$(cat <<'EOF'
          ${{ github.event.comment.body }}
          EOF
          )
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            BODY=$(cat <<'EOF'
          ${{ github.event.comment.body }}
          EOF
          )
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            BODY=$(cat <<'EOF'
          ${{ github.event.review.body }}
          EOF
          )
          elif [ "${{ github.event_name }}" = "issues" ]; then
            BODY=$(cat <<'EOF'
          ${{ github.event.issue.body }}
          EOF
          )
          fi

          contains_keyword() {
            local keyword="$1"
            [[ "$BODY_LOWER" =~ (^|[^[:alnum:]_])${keyword}([^[:alnum:]_]|$) ]]
          }

          BODY_LOWER=$(printf '%s' "$BODY" | tr '[:upper:]' '[:lower:]')

          if contains_keyword "opus48" || contains_keyword "opus"; then
            MODEL="claude-opus-4-8"
          elif contains_keyword "opus47"; then
            MODEL="claude-opus-4-7"
          elif contains_keyword "sonnet5" || contains_keyword "sonnet"; then
            MODEL="claude-sonnet-5"
          elif contains_keyword "sonnet46"; then
            MODEL="claude-sonnet-4-6"
          elif contains_keyword "haiku45" || contains_keyword "haiku"; then
            MODEL="claude-haiku-4-5"
          else
            MODEL="claude-sonnet-5"
          fi

          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "Selected model: $MODEL"

      - name: Run Claude Code
        id: run-claude-code
        uses: anthropics/claude-code-action@b76a0776ae74036e77cd11018083743453d7ad35 # v1.0.179
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}

          additional_permissions: |
            actions: read

          allowed_bots: ${{ inputs.allowed_bots }}

          claude_args: |
            --model ${{ steps.determine-claude-model.outputs.model }}
            ${{ inputs.claude_args }}

          settings: ${{ inputs.settings }}
